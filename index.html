<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Vocabulary</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f4f6f8;
    margin:40px;
}

h1{
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:15px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    font-size:17px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:5px;
}

.add{
    background:#2196F3;
    color:white;
}

.clear{
    background:#f44336;
    color:white;
}

.word{
    background:white;
    margin-top:15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 5px rgba(0,0,0,.1);
    cursor:pointer;
}

.english{
    font-size:24px;
    font-weight:bold;
}

.korean{
    display:none;
    margin-top:10px;
    color:#1565c0;
    font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>📖 My Vocabulary</h1>

<div class="card">

<label>영어 단어</label>

<input
id="english"
placeholder="예) abnormal">

<label>뜻</label>

<input
id="korean"
placeholder="예) 비정상적인">

<button class="add" onclick="addWord()">
➕ 단어 추가
</button>

<button class="clear" onclick="deleteAll()">
🗑 전체 삭제
</button>

</div>

<div id="wordList"></div>

</div>

<script>

let words = JSON.parse(localStorage.getItem("words")) || [];

function save(){
    localStorage.setItem("words",JSON.stringify(words));
}

function draw(){

const list=document.getElementById("wordList");

list.innerHTML="";

words.forEach((word,index)=>{

const div=document.createElement("div");

div.className="word";

div.innerHTML=`
<div class="english">${word.english}</div>

<div class="korean">${word.korean}</div>
`;

div.onclick=function(){

const meaning=div.querySelector(".korean");

if(meaning.style.display=="block"){
meaning.style.display="none";
}
else{
meaning.style.display="block";
}

}

list.appendChild(div);

});

}

function addWord(){

const english=document.getElementById("english").value.trim();

const korean=document.getElementById("korean").value.trim();

if(english=="" || korean==""){
alert("영어와 뜻을 모두 입력하세요.");
return;
}

words.push({
english,
korean
});

save();

draw();

document.getElementById("english").value="";
document.getElementById("korean").value="";

}

function deleteAll(){

if(confirm("모든 단어를 삭제할까요?")){

words=[];

save();

draw();

}

}

draw();

</script>

</body>
</html>
